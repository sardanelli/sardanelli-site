name: Generate Gallery JSON

on:
  push:
    paths:
      - 'fotos/**'
  workflow_dispatch:

jobs:
  generate-gallery:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate gallery.json
        run: |
          python3 << 'EOF'
          import json
          from pathlib import Path

          fotos_dir = Path('fotos')
          gallery = []

          if fotos_dir.exists():
              for img in sorted(fotos_dir.glob('*')):
                  if img.suffix.lower() in ['.jpg', '.jpeg', '.png', '.webp', '.gif', '.avif']:
                      gallery.append(f'fotos/{img.name}')

          with open('gallery.json', 'w', encoding='utf-8') as f:
              json.dump(gallery, f, indent=2, ensure_ascii=False)
          
          print(f'✅ Gerado gallery.json com {len(gallery)} imagens')
          EOF

      - name: Commit e push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add gallery.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "📸 Atualizar galeria" && git push)
